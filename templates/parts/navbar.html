{% load static %}

<!-- Start Nav Bar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark navbar fixed-top">
    <a class="navbar-brand" href="{% url 'post:about_us' %}" target="_blank">About US</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item active">
                <a class="nav-link" href="{% url 'post:all_posts'%}">Home <span class="sr-only">(current)</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'post:create'%}">Add Post</a>
            </li>
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-toggle="dropdown" aria-expanded="false">
                    Status
                </a>
                <div class="dropdown-menu">
                    <a class="dropdown-item {% if request.GET.status == 'active' %}active{% endif %}"
                        href="?status=active">Active</a>
                    <a class="dropdown-item" href="?status=inactive">Not Active</a>
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item" href="#">Something else here</a>
                </div>
            </li>
            <!-- <li class="nav-item">
        <a class="nav-link disabled">Disabled</a>
      </li> -->
        </ul>
        <form method="GET" action="{% url 'post:all_posts' %}" class="form-inline my-2 my-lg-0">
            <div>
                <input name="q" class="form-control mr-sm-2" type="search" placeholder="Search for posts..."
                    aria-label="Search" value="{{ request.GET.q }}">

                {% if request.GET.q %}
                <a href="{% url 'post:all_posts' %}" class="btn btn-outline-danger" title="Clear Search">
                    <i class="fa fa-times"></i> ✕
                </a>
                {% endif %}

                <button class="btn btn-outline-info rounded-pill my-2 my-sm-0" type="submit">Search</button>
        </form>
    </div>
    </div>
</nav>

<!-- End Nav Bar -->
